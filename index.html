<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Backyard Birds — a cozy feeder idle</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Fullscreen pixel-art game scene -->
  <canvas id="game" width="480" height="270"></canvas>

  <!-- Floating HUD -->
  <header id="hud" class="panel">
    <div class="hud-title">
      <span class="logo">🐦</span>
      <div>
        <b>Backyard Birds</b>
        <span class="area-name" id="areaName">Suburban Backyard</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat" title="Bird Points"><span class="si">✨</span><span class="sv" id="pointsVal">0</span></div>
      <div class="stat" title="Seed in feeder"><span class="si">🌾</span><span class="sv"><span id="foodVal">0</span><span class="mut">/<span id="capVal">5</span></span></span></div>
      <div class="stat" title="Happy visits"><span class="si">💛</span><span class="sv" id="happyVal">0</span></div>
      <div class="stat" title="Species discovered"><span class="si">📖</span><span class="sv"><span id="discVal">0</span><span class="mut">/<span id="totalVal">0</span></span></span></div>
    </div>
  </header>

  <!-- Top-right mini controls -->
  <div id="miniControls">
    <button id="muteBtn" class="icon-btn" title="Toggle sound">🔊</button>
    <button id="resetBtn" class="icon-btn" title="Reset progress">↺</button>
  </div>

  <!-- Toasts -->
  <div id="toasts"></div>

  <!-- Ticker -->
  <div id="ticker" class="panel">A gentle breeze drifts through the yard…</div>

  <!-- Bottom action bar -->
  <div id="actionBar">
    <button id="btnShop"  class="menu-btn"><span>🛠️</span>Shop</button>
    <button id="scatterBtn" class="scatter-btn"><span class="scatter-ico">🌾</span>Scatter Seed<small>Space / click feeder</small></button>
    <button id="btnIndex" class="menu-btn"><span>📖</span>Birds</button>
    <button id="btnAreas" class="menu-btn"><span>🗺️</span>Areas</button>
  </div>

  <!-- ===== Overlay panels ===== -->
  <div class="overlay hidden" id="overlayShop">
    <div class="sheet">
      <div class="sheet-head"><h2>🛠️ Shop</h2><button class="sheet-close" data-close>✕</button></div>
      <p class="sheet-intro">Spend Bird Points to grow your sanctuary.</p>
      <div id="shopList" class="shop-list"></div>
    </div>
  </div>

  <div class="overlay hidden" id="overlayIndex">
    <div class="sheet">
      <div class="sheet-head"><h2>📖 Bird Index</h2><button class="sheet-close" data-close>✕</button></div>
      <p class="sheet-intro">Every species that has visited your feeder.</p>
      <div id="indexGrid" class="index-grid"></div>
    </div>
  </div>

  <div class="overlay hidden" id="overlayAreas">
    <div class="sheet">
      <div class="sheet-head"><h2>🗺️ Areas</h2><button class="sheet-close" data-close>✕</button></div>
      <p class="sheet-intro">New habitats to unlock as you grow.</p>
      <div id="areaList" class="area-list"></div>
    </div>
  </div>

  <!-- Species card popup -->
  <div id="cardModal" class="overlay hidden">
    <div class="card-pop">
      <button class="sheet-close" id="cardClose">✕</button>
      <canvas id="cardCanvas" width="96" height="80"></canvas>
      <h2 id="cardName">—</h2>
      <div class="card-rarity" id="cardRarity">common</div>
      <p id="cardDesc">—</p>
      <div class="card-stats">
        <span>✨ <b id="cardPoints">0</b> pts</span>
        <span>👀 <b id="cardSeen">0</b>×</span>
      </div>
    </div>
  </div>

  <script src="js/birds.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
